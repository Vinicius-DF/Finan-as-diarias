<!doctype html>
<html lang="pt-BR" class="dark h-full bg-[#020617]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle Sem Surpresas v2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FinançaPro" />
    <link rel="apple-touch-icon" href="/pwa_icon_512.jpg" />
  </head>
  <body class="h-full bg-[#020617] text-slate-100 antialiased font-['Inter',_sans-serif]">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('[PWA] Service Worker registrado com sucesso:', reg.scope);
            })
            .catch((err) => {
              console.error('[PWA] Falha ao registrar o Service Worker:', err);
            });
        });
      }
    </script>
  </body>
</html>
